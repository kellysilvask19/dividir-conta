<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Dividir Conta</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      text-align: center;
      background: linear-gradient(to right, green 33%, white 33% 66%, red 66%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    input {
      margin: 10px;
      padding: 12px;
      font-size: 18px;
      width: 80%;
      max-width: 400px;
      box-sizing: border-box;
    }
    button {
      margin: 10px;
      padding: 12px 20px;
      font-size: 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      width: 80%;
      max-width: 300px;
      box-sizing: border-box;
    }
    .btn-adicionar {
      background-color: #28a745; /* verde */
      color: white;
    }
    .btn-ok {
      background-color: #007bff; /* azul */
      color: white;
    }
    #saldo {
      margin-top: 20px;
      padding: 15px;
      background-color: #f8f9fa; /* cinza claro */
      border: 2px solid #333;
      border-radius: 8px;
      font-size: 20px;
      font-weight: bold;
      width: 90%;
      max-width: 400px;
    }
    #relatorio {
      margin-top: 20px;
      padding: 15px;
      background-color: rgba(255,255,255,0.9);
      border-radius: 8px;
      width: 90%;
      max-width: 500px;
      text-align: left;
    }
    h2 {
      background-color: rgba(255,255,255,0.7);
      display: inline-block;
      padding: 8px 12px;
      border-radius: 5px;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <h2>Dividir Conta</h2>
  
  <div class="campo-total">
    <label for="valorTotal">Valor total da conta:</label><br>
    <input type="number" id="valorTotal" step="0.01">
  </div>
  
  <div id="clientes"></div>
  
  <button class="btn-adicionar" onclick="adicionarCliente()">Adicionar Cliente</button>
  <button class="btn-ok" onclick="gerarRelatorio()">OK</button>
  
  <div id="saldo">Saldo restante: R$ <span id="restante">0.00</span></div>
  
  <div id="relatorio"></div>
  
  <script>
    let pagamentos = [];

    function atualizarRestante() {
      const total = parseFloat(document.getElementById("valorTotal").value) || 0;
      const soma = pagamentos.reduce((acc, val) => acc + val, 0);
      const restante = total - soma;
      document.getElementById("restante").textContent = restante.toFixed(2);
    }

    function adicionarCliente() {
      const div = document.createElement("div");
      const input = document.createElement("input");
      input.type = "number";
      input.step = "0.01";
      input.placeholder = "Valor do cliente";

      // índice fixo baseado na ordem de criação
      const index = pagamentos.length;

      input.addEventListener("input", () => {
        pagamentos[index] = parseFloat(input.value) || 0;
        atualizarRestante();
      });

      div.appendChild(input);
      document.getElementById("clientes").appendChild(div);
      pagamentos.push(0);
    }

    function gerarRelatorio() {
      const total = parseFloat(document.getElementById("valorTotal").value) || 0;
      let relatorio = "<h4>Relatório Final</h4>";
      pagamentos.forEach((valor, i) => {
        relatorio += `Cliente ${i+1}: R$ ${valor.toFixed(2)}<br>`;
      });
      const soma = pagamentos.reduce((acc, val) => acc + val, 0);
      const restante = total - soma;
      relatorio += `<strong>Total pago: R$ ${soma.toFixed(2)}</strong><br>`;
      relatorio += `<strong>Saldo restante: R$ ${restante.toFixed(2)}</strong>`;
      document.getElementById("relatorio").innerHTML = relatorio;
    }
  </script>
</body>
</html>
