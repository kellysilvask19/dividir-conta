<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Dividir Conta</title>
  <!-- Faz a página se adaptar ao tamanho da tela do celular -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      text-align: center;
      background: linear-gradient(to right, green 33%, white 33% 66%, red 66%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }
    input, button {
      margin: 10px;
      padding: 12px;
      font-size: 18px; /* aumenta o tamanho para celular */
      width: 80%;      /* ocupa boa parte da tela */
      max-width: 400px;
      box-sizing: border-box;
    }
    button {
      cursor: pointer;
      border: none;
      border-radius: 5px;
    }
    #relatorio {
      margin-top: 20px;
      padding: 15px;
      background-color: rgba(255,255,255,0.85);
      border-radius: 8px;
      width: 90%;
      max-width: 500px;
      text-align: left;
    }
    h2, h3 {
      background-color: rgba(255,255,255,0.7);
      display: inline-block;
      padding: 8px 12px;
      border-radius: 5px;
      margin-bottom: 15px;
    }
    .campo-total {
      margin-top: 20px;
      width: 100%;
    }
  </style>
</head>
<body>
  <h2>Dividir Conta</h2>
  
  <div class="campo-total">
    <label for="valorTotal">Valor total da conta:</label><br>
    <input type="number" id="valorTotal" step="0.01">
  </div>
  
  <div id="clientes"></div>
  
  <button style="background-color:green; color:white;" onclick="adicionarCliente()">Adicionar Cliente</button>
  <button style="background-color:red; color:white;" onclick="gerarRelatorio()">OK</button>
  
  <h3>Saldo restante: R$ <span id="restante">0.00</span></h3>
  
  <div id="relatorio"></div>
  
  <script>
    let pagamentos = [];
    
    function atualizarRestante() {
      const total = parseFloat(document.getElementById("valorTotal").value) || 0;
      const soma = pagamentos.reduce((acc, val) => acc + val, 0);
      const restante = total - soma;
      document.getElementById("restante").textContent = restante.toFixed(2);
    }
    
    function adicionarCliente() {
      const div = document.createElement("div");
      const input = document.createElement("input");
      input.type = "number";
      input.step = "0.01";
      input.placeholder = "Valor do cliente";
      
      input.addEventListener("input", () => {
        const index = Array.from(document.getElementById("clientes").children).indexOf(div);
        pagamentos[index] = parseFloat(input.value) || 0;
        atualizarRestante();
      });
      
      div.appendChild(input);
      document.getElementById("clientes").appendChild(div);
      pagamentos.push(0);
    }
    
    function gerarRelatorio() {
      const total = parseFloat(document.getElementById("valorTotal").value) || 0;
      let relatorio = "<h4>Relatório Final</h4>";
      pagamentos.forEach((valor, i) => {
        relatorio += `Cliente ${i+1}: R$ ${valor.toFixed(2)}<br>`;
      });
      const soma = pagamentos.reduce((acc, val) => acc + val, 0);
      const restante = total - soma;
      relatorio += `<strong>Total pago: R$ ${soma.toFixed(2)}</strong><br>`;
      relatorio += `<strong>Saldo restante: R$ ${restante.toFixed(2)}</strong>`;
      document.getElementById("relatorio").innerHTML = relatorio;
    }
  </script>
</body>
</html>
